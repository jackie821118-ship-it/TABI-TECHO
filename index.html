<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本旅遊手帳</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --wa:#f5f0e6;--wa2:#ede6d5;--wa3:#ddd3bc;
  --su:#2e2720;--su2:#5c5044;--su3:#9c8e7e;
  --aka:#c0392b;--aka2:#e06050;
  --kin:#b07830;--kin2:#d4a05a;
  --ai:#3d6e8a;--ai2:#6898b0;
  --mg:#5a7a48;--mg2:#8aaa72;
  --fuji:#806898;
  --sh:rgba(46,39,32,.10);
  --xs:11px;--sm:13px;--md:15px;--lg:17px;--xl:20px;--xxl:24px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;font-size:var(--md);background:var(--wa);color:var(--su);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:900;background:repeating-linear-gradient(0deg,transparent,transparent 23px,rgba(160,140,100,.05) 23px,rgba(160,140,100,.05) 24px),repeating-linear-gradient(90deg,transparent,transparent 23px,rgba(160,140,100,.03) 23px,rgba(160,140,100,.03) 24px)}

/* seigaiha */
.sgb{height:10px;background:var(--aka);position:sticky;top:0;z-index:201;overflow:hidden}
.sgb::before{content:'';position:absolute;top:-5px;left:0;right:0;height:20px;background:radial-gradient(circle at 50% 100%,transparent 8px,var(--aka) 8px,var(--aka) 10px,transparent 10px) -10px 0/20px 10px,radial-gradient(circle at 50% 100%,transparent 8px,var(--kin) 8px,var(--kin) 10px,transparent 10px) 0 5px/20px 10px;background-color:var(--aka)}

/* HEADER */
.hdr{background:linear-gradient(155deg,#f0e8d4,#e4d9c0 60%,#d8ccb0);padding:14px 16px 12px;position:sticky;top:10px;z-index:200;overflow:hidden;border-bottom:2px solid var(--wa3)}
.hdr-k{position:absolute;right:4px;top:-6px;font-family:'Shippori Mincho',serif;font-size:86px;font-weight:700;line-height:1;color:var(--kin);opacity:.08;writing-mode:vertical-rl;letter-spacing:-10px;pointer-events:none;user-select:none}
.hdr-row{display:flex;align-items:center;gap:11px}
.hdr-mon{width:38px;height:38px;border-radius:50%;border:2px solid var(--kin);display:flex;align-items:center;justify-content:center;font-size:19px;background:rgba(255,255,255,.4);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.trip-lbl{font-size:var(--xs);letter-spacing:4px;color:var(--aka);font-weight:700;margin-bottom:3px;text-transform:uppercase}
.trip-ttl{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600;color:var(--su);line-height:1.2;letter-spacing:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trip-dt{font-size:var(--sm);color:var(--su2);margin-top:3px}
.wx-chip{background:var(--ai);color:white;border-radius:9px;padding:8px 11px;text-align:center;flex-shrink:0;min-width:62px;cursor:pointer;transition:opacity .2s}
.wx-chip:hover{opacity:.9}
.wx-chip-t{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:400;line-height:1}
.wx-chip-s{font-size:9px;color:rgba(255,255,255,.8);margin-top:3px;line-height:1.3}

/* SECTIONS */
.section{display:none;padding:14px 14px 100px}
.section.active{display:block}
.sec-ttl{font-family:'Shippori Mincho',serif;font-size:var(--xl);font-weight:600;color:var(--su);margin-bottom:13px;display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.sec-ttl::before{content:'';width:4px;height:15px;background:var(--aka);border-radius:2px;flex-shrink:0}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--wa3)}

/* DAY CHIPS */
.daybar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:10px 0 6px;margin-bottom:12px;position:sticky;top:calc(10px + var(--hdr-h,68px));z-index:198;background:var(--wa)}
.daybar::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;min-width:54px;padding:7px 9px;border-radius:6px;border:1.5px solid var(--wa3);background:white;cursor:pointer;text-align:center;transition:all .2s}
.dc .dn{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:600;display:block;line-height:1}
.dc .dl{font-size:10px;color:var(--su3);margin-top:2px}
.dc.on{background:var(--aka);border-color:var(--aka);color:white}
.dc.on .dl{color:rgba(255,255,255,.7)}

/* TIMELINE */
.dtrow{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.dttxt{font-family:'Shippori Mincho',serif;font-size:var(--xl);font-weight:600;color:var(--su);flex:1;letter-spacing:.5px}
.tl{position:relative}
.tl::before{content:'';position:absolute;left:43px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--wa3) 6%,var(--wa3) 94%,transparent)}
.tlr{display:flex;gap:10px;margin-bottom:11px;animation:fadeUp .3s ease both}
.tlt{width:50px;font-family:'Noto Sans TC',sans-serif;font-size:15px;color:var(--su3);text-align:right;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;padding:12px 0 10px}
.ts{font-size:15px;color:var(--su3);line-height:1}
.te{font-size:15px;color:var(--su3);line-height:1}
.tld{width:9px;height:9px;border-radius:50%;border:2px solid var(--wa3);background:var(--wa);flex-shrink:0;margin-top:16px;position:relative;z-index:1}
.tld.sight{border-color:var(--kin);background:#fdf4e0}
.tld.food{border-color:var(--aka);background:#fde8e4}
.tld.transport{border-color:var(--ai);background:#e4eff7}
.tld.shopping{border-color:var(--mg);background:#eaf4e4}
.tld.hotel{border-color:#806898;background:#f0ecf8}
.tld.collect{border-color:#e07820;background:#fef0e0}
.tlc{flex:1;background:white;border-radius:7px;border:1px solid var(--wa3);box-shadow:0 2px 6px var(--sh);overflow:hidden;position:relative}
.tlc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.tlc.sight::before{background:var(--kin)}.tlc.food::before{background:var(--aka)}.tlc.transport::before{background:var(--ai)}.tlc.shopping::before{background:var(--mg)}.tlc.hotel::before{background:#806898}.tlc.collect::before{background:#e07820}
.tlm{padding:11px 12px}
.tlh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.tln{font-size:var(--lg);font-weight:700;color:var(--su);line-height:1.3}
.tltag{font-size:var(--sm);padding:2px 7px;border-radius:3px;font-weight:700;flex-shrink:0;margin-left:5px}
.tltag.sight{background:#fdf4e0;color:var(--kin)}.tltag.food{background:#fde8e4;color:var(--aka)}.tltag.transport{background:#e4eff7;color:var(--ai)}.tltag.shopping{background:#eaf4e4;color:var(--mg)}.tltag.hotel{background:#f0ecf8;color:#806898}.tltag.collect{background:#fef0e0;color:#e07820}
.tlde{font-size:var(--md);color:var(--su2);line-height:1.6;margin-bottom:6px}
.tlmt{display:flex;gap:10px}
.tlmt span{font-size:var(--sm);color:var(--su3)}
.xbtn{display:flex;align-items:center;gap:3px;font-size:var(--xs);color:var(--ai);margin-top:6px;cursor:pointer;font-weight:600;border:none;background:none;padding:0;font-family:'Noto Sans TC',sans-serif}
.xbtn .ar{font-size:9px;transition:transform .25s;display:inline-block}
.xbtn.open .ar{transform:rotate(90deg)}
.xnotes{display:none;padding:9px 12px 11px;border-top:1px dashed var(--wa3);background:var(--wa)}
.xnotes.show{display:block}
.xntxt{font-size:var(--sm);color:var(--su2);line-height:1.75;margin-bottom:7px}
.xlink{display:inline-flex;align-items:center;gap:4px;font-size:var(--sm);color:white;background:var(--ai);padding:6px 12px;border-radius:5px;text-decoration:none;font-weight:600}

/* WEATHER */
.city-tabs{display:flex;gap:0;margin-bottom:13px;border:1.5px solid var(--wa3);border-radius:7px;overflow:hidden;background:var(--wa2)}
.ctab{flex:1;padding:9px 3px;font-size:var(--sm);font-weight:600;border:none;background:none;cursor:pointer;color:var(--su3);transition:all .2s;text-align:center;font-family:'Noto Sans TC',sans-serif}
.ctab.on{background:var(--ai);color:white}
.wx-hero{border-radius:9px;padding:17px;margin-bottom:13px;background:linear-gradient(135deg,#2d5a7a,#3d7a9a 55%,#2a5570);color:white;position:relative;overflow:hidden}
.wxcity{font-size:var(--xs);letter-spacing:3px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:2px}
.wxrow{display:flex;align-items:flex-end;gap:11px;margin-bottom:9px}
.wxtemp{font-family:'Shippori Mincho',serif;font-size:64px;font-weight:400;line-height:1}
.wxcond{font-size:var(--md);color:rgba(255,255,255,.9)}
.wxhl{font-size:var(--sm);color:rgba(255,255,255,.65);margin-top:3px}
.wxsts{display:flex;gap:15px;padding-top:9px;border-top:1px solid rgba(255,255,255,.15);flex-wrap:wrap}
.wxst{font-size:var(--sm);color:rgba(255,255,255,.6)}
.wxst strong{display:block;font-size:var(--lg);font-weight:300;color:white;margin-top:2px}
.hw{background:white;border:1px solid var(--wa3);border-radius:9px;margin-bottom:13px;overflow:hidden}
.hwhdr{font-size:var(--sm);font-weight:700;color:var(--su2);padding:11px 12px 9px;border-bottom:1px solid var(--wa3)}
.hscr{display:flex;overflow-x:auto;scrollbar-width:none;padding:9px 11px 11px}
.hscr::-webkit-scrollbar{display:none}
.hi{flex-shrink:0;text-align:center;min-width:48px;padding:0 3px}
.hitime{font-size:var(--xs);color:var(--su3);margin-bottom:4px}
.hiic{font-size:17px;margin-bottom:3px}
.hibw{height:26px;display:flex;align-items:flex-end;justify-content:center;margin:3px 0}
.hib{width:5px;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--ai),var(--aka2));min-height:3px}
.hit{font-family:'Shippori Mincho',serif;font-size:var(--sm);font-weight:600;color:var(--su)}
.hir{font-size:var(--xs);color:var(--ai);margin-top:1px}
.fcscr{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-bottom:13px}
.fcscr::-webkit-scrollbar{display:none}
.fcc{flex-shrink:0;background:white;border:1px solid var(--wa3);border-radius:7px;padding:10px 8px;text-align:center;min-width:64px}
.fcd{font-size:var(--sm);color:var(--su3);margin-bottom:5px;font-weight:600}
.fcic{font-size:21px;margin-bottom:3px}
.fchi{font-size:var(--sm);font-weight:700;color:var(--aka)}
.fclo{font-size:var(--sm);color:var(--ai);margin-top:1px}
.fcr{font-size:var(--xs);color:var(--ai2);margin-top:2px}
.adv-card{background:linear-gradient(135deg,#fdf5e6,#f8ecd6);border:1px solid #e8d8a8;border-radius:9px;padding:12px 14px;margin-bottom:13px}
.adv-txt{font-size:var(--sm);color:var(--su2);line-height:1.75}
.wxsrc{font-size:var(--xs);color:var(--su3);text-align:right;margin:-5px 0 13px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.wxsrc a{color:var(--ai);text-decoration:none;font-weight:600}

/* TRANSPORT */
.trc{background:white;border:1px solid var(--wa3);border-radius:9px;margin-bottom:11px;overflow:hidden;box-shadow:0 2px 6px var(--sh)}
.trh{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--wa3);background:linear-gradient(90deg,var(--ai),#3a6a88);color:white}
.trrt{font-size:var(--lg);font-weight:700}
.trtp{font-size:var(--xs);background:rgba(255,255,255,.2);padding:2px 8px;border-radius:9px;font-weight:600}
.trtl{display:flex;align-items:center;gap:8px;padding:11px 14px}
.trsta{text-align:center}
.trstanm{font-size:var(--md);font-weight:700}
.trstati{font-size:var(--sm);color:var(--su2);margin-top:2px;font-family:'Shippori Mincho',serif}
.trln{flex:1;position:relative}
.trtr{height:2px;background:var(--ai2)}
.trdu{font-size:var(--xs);color:var(--su3);text-align:center;margin-top:3px}
.trar{position:absolute;right:-4px;top:-6px;color:var(--ai);font-size:10px}
.schw{background:var(--wa2);border-top:1px solid var(--wa3)}
.schl{font-size:var(--xs);color:var(--su3);font-weight:700;letter-spacing:1px;padding:7px 14px 3px;text-transform:uppercase}
.schr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:1px dashed var(--wa3);font-size:var(--sm)}
.schr.main{background:rgba(61,110,138,.08);font-weight:700}
.scht{font-family:'Shippori Mincho',serif;font-size:var(--md);color:var(--su);min-width:42px}
.scha{font-family:'Shippori Mincho',serif;font-size:var(--md);color:var(--su);min-width:42px;text-align:right}
.schk{font-size:var(--xs);padding:2px 7px;border-radius:4px;background:var(--ai2);color:white;font-weight:600;flex:1;text-align:center;margin:0 7px}
.schb{font-size:var(--xs);color:var(--kin);font-weight:700;min-width:34px;text-align:right}
.trft{display:flex;gap:12px;padding:8px 14px;flex-wrap:wrap;border-top:1px solid var(--wa3)}
.trf{font-size:var(--sm);color:var(--su3)}
.trf strong{color:var(--su);font-weight:700}
.trf .red{color:var(--aka);font-weight:700}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(245,240,230,.97);border-top:1.5px solid var(--wa3);padding:7px 0 20px;z-index:200;backdrop-filter:blur(10px);display:flex;justify-content:space-around}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--wa3);font-size:var(--xs);font-family:'Noto Sans TC',sans-serif;padding:5px 12px;transition:color .2s;font-weight:600}
.bn.on{color:var(--aka)}
.bnic{font-size:23px;line-height:1}

/* LOADING / ERROR states */
.loading-card{text-align:center;padding:40px 20px;color:var(--su3)}
.loading-icon{font-size:36px;margin-bottom:10px;animation:spin 1s linear infinite;display:block}
.loading-txt{font-size:var(--md)}
.error-card{background:#fde8e4;border:1px solid var(--aka2);border-radius:9px;padding:14px 16px;margin-bottom:14px}
.error-ttl{font-size:var(--md);font-weight:700;color:var(--aka);margin-bottom:6px}
.error-txt{font-size:var(--sm);color:var(--su2);line-height:1.65}
.error-hint{font-size:var(--xs);color:var(--su3);margin-top:8px;line-height:1.65;background:var(--wa2);border-radius:6px;padding:8px 10px}
.sync-bar{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--wa2);border-bottom:1px solid var(--wa3);font-size:var(--xs);color:var(--su3)}
.sync-time{display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--mg);flex-shrink:0}
.sync-dot.loading{background:var(--kin);animation:pulse .8s ease infinite}
.sync-dot.error{background:var(--aka)}
.sync-btn-sm{background:none;border:1px solid var(--wa3);border-radius:4px;padding:3px 8px;font-size:var(--xs);color:var(--su3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;transition:all .15s}
.sync-btn-sm:hover{border-color:var(--ai);color:var(--ai)}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--su);color:var(--wa);font-size:var(--sm);padding:8px 17px;border-radius:17px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:600}
.toast.show{opacity:1}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(46,39,32,.55);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{background:var(--wa);border-radius:14px 14px 0 0;width:100%;max-width:430px;margin:0 auto;padding:19px 17px 42px;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-height:85vh;overflow-y:auto}
.mbg.open .modal{transform:translateY(0)}
.mpip{width:33px;height:4px;background:var(--wa3);border-radius:2px;margin:0 auto 17px}
.mttl{font-family:'Shippori Mincho',serif;font-size:var(--xl);font-weight:600;margin-bottom:14px;color:var(--su)}
.fg{margin-bottom:12px}
.fl{font-size:var(--xs);letter-spacing:1.5px;color:var(--su3);text-transform:uppercase;margin-bottom:5px;display:block;font-weight:700}
.fi{width:100%;padding:9px 11px;border:1.5px solid var(--wa3);border-radius:7px;font-size:var(--md);font-family:'Noto Sans TC',sans-serif;background:white;color:var(--su);outline:none}
.fi:focus{border-color:var(--ai)}
.bpri{width:100%;background:var(--su);color:var(--wa);border:none;border-radius:7px;padding:12px;font-size:var(--md);font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;margin-top:14px}

.infob{background:#fdf5de;border:1px solid #e8d080;border-radius:7px;padding:11px 13px;font-size:var(--sm);color:#7a6010;margin-bottom:13px;line-height:1.65;display:flex;gap:7px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}

/* ── 購物頁 */
.shop-store{background:white;border:1px solid var(--wa3);border-radius:9px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 6px var(--sh)}
.shop-store-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.shop-logo{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--wa3);flex-shrink:0;background:var(--wa2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.shop-logo img{width:100%;height:100%;object-fit:cover}
.shop-store-name{font-size:var(--lg);font-weight:700;color:var(--su);flex:1}
.shop-store-count{font-size:var(--xs);color:var(--su3);margin-top:2px}
.shop-chevron{font-size:12px;color:var(--su3);transition:transform .25s;flex-shrink:0}
.shop-chevron.open{transform:rotate(180deg)}
.shop-items{display:none;border-top:1px solid var(--wa3)}
.shop-items.show{display:block}
.shop-item{padding:12px 14px;border-bottom:1px dashed var(--wa3)}
.shop-item:last-child{border-bottom:none}
.shop-item-name{font-size:var(--md);font-weight:700;color:var(--su);margin-bottom:4px}
.shop-item-note{font-size:var(--sm);color:var(--su2);line-height:1.65;margin-bottom:6px}
.shop-item-img{width:100%;max-height:200px;object-fit:cover;border-radius:6px;margin-bottom:7px;display:block}
.shop-item-links{display:flex;gap:7px;flex-wrap:wrap}

/* ── 地圖頁 */
.map-card{background:white;border:1px solid var(--wa3);border-radius:9px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 6px var(--sh);cursor:pointer}
.map-card-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px}
.map-logo{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--wa3);flex-shrink:0;background:var(--wa2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.map-logo img{width:100%;height:100%;object-fit:cover}
.map-name{font-size:var(--lg);font-weight:700;color:var(--su);flex:1}
.map-chevron{font-size:12px;color:var(--su3);transition:transform .25s;flex-shrink:0}
.map-chevron.open{transform:rotate(180deg)}
.map-img-box{display:none;border-top:1px solid var(--wa3)}
.map-img-box.show{display:block}
.map-img-box img{width:100%;height:auto;display:block}

/* ── Lightbox 放大圖片 */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;padding:12px}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;touch-action:pinch-zoom}
.lightbox-close{position:fixed;top:14px;right:16px;color:white;font-size:28px;cursor:pointer;z-index:1001;line-height:1;background:rgba(0,0,0,.4);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
</style>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>

<script>
const SHEET_ID='1bOCgGEbMbJr_B771DvL6iFqX0fLPivfCA_4ma6aq2T4';
const TLAB={sight:'景點',food:'餐飲',transport:'交通',shopping:'購物',hotel:'住宿',collect:'收集'};
let S={trip:{title:'—',dates:'—',mapImg:''},days:[],itinerary:{},weatherDays:{},weatherData:{}};
let curDay={itin:0,transport:0,weather:0},curCity=0,wxPlaces=[];

function csvUrl(s){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&headers=0&sheet=${encodeURIComponent(s)}`;
}

function parseCSV(text){
  return text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim()).map(line=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cells.push(cur.trim());return cells;
  });
}

async function fetchSheet(name){
  const r=await fetch(csvUrl(name),{cache:'no-cache'});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const t=await r.text();
  if(!t.trim())throw new Error('空回應');
  return parseCSV(t);
}

async function loadAll(){
  setSS('loading','同步中…');
  setEl('itin-content','<div class="loading-card"><span style="font-size:28px;display:block;margin-bottom:8px">⏳</span><div>資料載入中…</div></div>');
  const[thR,sumR,itR,wxR,shopR,mapR]=await Promise.allSettled([
    fetchSheet('主題'),
    fetchSheet('摘要'),
    fetchSheet('行程'),
    fetchSheet('天氣'),
    fetchSheet('購物'),
    fetchSheet('地圖')
  ]);
  if(thR.status==='fulfilled')parseTheme(thR.value);
  else console.warn('主題:',thR.reason?.message);
  if(sumR.status==='fulfilled')parseSummary(sumR.value);
  else console.warn('摘要:',sumR.reason?.message);
  if(itR.status==='fulfilled')parseItinerary(itR.value);
  else showErr('itin-content','行程載入失敗：'+(itR.reason?.message||''));
  if(wxR.status==='fulfilled')parseWeatherSheet(wxR.value);
  else console.warn('天氣:',wxR.reason?.message);
  if(shopR.status==='fulfilled')renderShopping(shopR.value);
  else console.warn('購物:',shopR.reason?.message);

  setSS('ok','已更新 '+now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));

// 主題：掃描 key-value 找旅遊主題/旅遊時間
function parseTheme(rows){
  if(!rows||rows.length<1)return;
  S.trip.title='旅遊手帳';S.trip.dates='';S.trip.mapImg='';
  for(const r of rows){
    const key=(r[0]||'').trim(),val=(r[1]||'').trim();
    if(key==='旅遊主題'&&val)S.trip.title=val;
    if(key==='旅遊時間'&&val)S.trip.dates=val;
  }
  // B3 = rows[2][1]（景點地圖連結圖片）
  if(rows[2]&&rows[2][1])S.trip.mapImg=(rows[2][1]||'').trim();
  console.log('主題:',S.trip.title,S.trip.dates,'mapImg:',S.trip.mapImg);
}

// 摘要：row[0]=欄位標題, row[1+]=每日 Day/日期/標題
function parseSummary(rows){
  if(!rows||rows.length<2)return;
  S.days=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i],dayNum=parseInt(r[0]);
    if(isNaN(dayNum)||dayNum<1)continue;
    const rawDate=(r[1]||'').trim();
    const m=rawDate.match(/\d{4}[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    const dateShort=m?`${parseInt(m[1])}/${parseInt(m[2])}`:rawDate;
    S.days.push({dayNum,date:rawDate,dateShort,title:(r[2]||'').trim()||`Day ${dayNum}`});
  }
  S.days.sort((a,b)=>a.dayNum-b.dayNum);
  console.log('摘要:',S.days.length,'天');
}

// 行程：欄位 時間起/時間迄/區間/標題/分類/說明/費用/備註/網頁/Google Map
function parseItinerary(rows){
  if(!rows||rows.length<2)return;
  S.itinerary={};
  const hdr=rows[0];
  const fi=(...keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h===k||h.includes(k));if(i>=0)return i;}return -1;};
  const cDay  =fi('Day','day','天');
  // 欄位對應（優先用名稱，找不到用位置）
  const cTimeS = fi('時間起','開始時間','time_start') >= 0 ? fi('時間起','開始時間','time_start') : 1;
  const cTimeE = fi('時間迄','結束時間','time_end','到達時間') >= 0 ? fi('時間迄','結束時間','time_end','到達時間') : 2;
  const cDur   = fi('區間','所需時間','duration','時長');
  const cName  = fi('標題','名稱') >= 0 ? fi('標題','名稱') : 4;
  const cCat   = fi('分類','類型') >= 0 ? fi('分類','類型') : 5;
  const cDesc  = fi('說明','描述') >= 0 ? fi('說明','描述') : 6;
  const cCost  = fi('費用') >= 0 ? fi('費用') : 7;
  const cNote  = fi('備註','備注') >= 0 ? fi('備註','備注') : 8;
  const cUrl   = fi('網頁','連結') >= 0 ? fi('網頁','連結') : 9;
  const cGmap  = fi('Google Map','google map','地圖') >= 0 ? fi('Google Map','google map','地圖') : 10;
  const cImg   = fi('圖片','image','img','照片');
  const cTrImg = fi('交通圖','transport_img','交通照片');
  console.log('行程欄位:', JSON.stringify(hdr));
  console.log('欄位index: Day=0 timeS='+cTimeS+' timeE='+cTimeE+' dur='+cDur+' name='+cName+' cat='+cCat);
  const fc=(r,c,fb)=>c>=0?String(r[c]??'').trim():(fb>=0?String(r[fb]??'').trim():'');
  for(let i=1;i<rows.length;i++){
    const r=rows[i],dayNum=parseInt(fc(r,cDay,0));
    if(isNaN(dayNum)||dayNum<1)continue;
    if(!S.itinerary[dayNum])S.itinerary[dayNum]=[];
    const cat=fc(r,cCat,3),name=fc(r,cName,2);
    if(!name)continue;
    const type=mapCat(cat);
    S.itinerary[dayNum].push({
      timeS:fc(r,cTimeS,1),timeE:fc(r,cTimeE,cTimeE>=0?cTimeE:2),
      type,icon:typeIcon(type),name,cat,
      desc:fc(r,cDesc,4),dur:fc(r,cDur,-1),cost:fc(r,cCost,6),
      note:fc(r,cNote,7),url:fc(r,cUrl,8),gmap:fc(r,cGmap,-1),img:fc(r,cImg,-1),trImg:fc(r,cTrImg,-1)
    });
  }
  console.log('行程:',Object.values(S.itinerary).flat().length,'筆');
}

// 天氣：row[0]=欄位標題, row[1+]=Day/時間/地點
function parseWeatherSheet(rows){
  if(!rows||rows.length<2)return;
  S.weatherDays={};
  const hdr=rows[0];
  const fi=(...keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h===k||h.includes(k));if(i>=0)return i;}return -1;};
  const cDay=fi('Day','day','天'),cTime=fi('時間'),cPlc=fi('地點','城市');
  const fc=(r,c,fb)=>String(r[c>=0?c:fb]??'').trim();
  for(let i=1;i<rows.length;i++){
    const r=rows[i],dayNum=parseInt(fc(r,cDay,0));
    if(isNaN(dayNum)||dayNum<1)continue;
    const place=fc(r,cPlc,2);if(!place)continue;
    if(!S.weatherDays[dayNum])S.weatherDays[dayNum]=[];
    S.weatherDays[dayNum].push({time:fc(r,cTime,1),place});
  }
  const seen=new Set();wxPlaces=[];
  for(const arr of Object.values(S.weatherDays))
    for(const d of arr)
      if(d.place&&!seen.has(d.place)){seen.add(d.place);wxPlaces.push(d.place);}
  if(!wxPlaces.length)wxPlaces=['名古屋'];
  console.log('天氣地點:',wxPlaces);
}

// Google Drive 連結轉換為可直接顯示的圖片 URL
function gdriveFileId(url){
  if(!url)return null;
  let m=url.match(/\/file\/d\/([^\/\?]+)/);
  if(m)return m[1];
  m=url.match(/[?&]id=([^&]+)/);
  if(m)return m[1];
  return null;
}
// 一般顯示用（縮圖，載入快）
function gdriveUrl(url){
  const id=gdriveFileId(url);
  if(id)return `https://lh3.googleusercontent.com/d/${id}`;
  return url||'';
}
// 高解析度用（原始檔案，用於放大檢視）
function gdriveHiRes(url){
  const id=gdriveFileId(url);
  if(id)return `https://drive.google.com/uc?export=view&id=${id}`;
  return url||'';
}

function mapCat(c){
  const s=(c||'').toLowerCase();
  if(s.includes('餐')||s.includes('食')||s.includes('飲'))return'food';
  if(s.includes('交通')||s.includes('車')||s.includes('機')||s.includes('船')||s.includes('巴士')||s.includes('電車'))return'transport';
  if(s.includes('購')||s.includes('買'))return'shopping';
  if(s.includes('住宿')||s.includes('飯店')||s.includes('旅館')||s.includes('hotel')||s.includes('inn')||s.includes('民宿'))return'hotel';
  if(s.includes('收集')||s.includes('collect')||s.includes('集章')||s.includes('紀念品'))return'collect';
  return'sight';
}
function typeIcon(t){return{sight:'⛩',food:'🍜',transport:'🚅',shopping:'🛍',hotel:'🏨',collect:'🎁'}[t]||'📍';}

// ── WEATHER
const COORDS={
  '名古屋':{lat:35.1815,lon:136.9066,name:'名古屋·NAGOYA',tenki:'https://tenki.jp/forecast/5/26/5110/23100/'},
  '愛知':  {lat:35.1802,lon:136.9066,name:'愛知縣',       tenki:'https://tenki.jp/forecast/5/26/5110/23100/'},
  '三重':  {lat:34.7303,lon:136.5086,name:'三重縣',       tenki:'https://tenki.jp/forecast/5/27/5410/24202/'},
  '伊勢':  {lat:34.4884,lon:136.7076,name:'伊勢',         tenki:'https://tenki.jp/forecast/5/27/5410/24215/'},
  '志摩':  {lat:34.3273,lon:136.8312,name:'志摩',         tenki:'https://tenki.jp/forecast/5/27/5410/24215/'},
  '鳥羽':  {lat:34.4849,lon:136.8437,name:'鳥羽',         tenki:'https://tenki.jp/forecast/5/27/5410/24215/'},
  '松阪':  {lat:34.5789,lon:136.5274,name:'松阪',         tenki:'https://tenki.jp/forecast/5/27/5410/24205/'},
  '滋賀':  {lat:35.0045,lon:135.8686,name:'滋賀縣',       tenki:'https://tenki.jp/forecast/6/29/6000/25201/'},
  '彦根':  {lat:35.2752,lon:136.2636,name:'彦根',         tenki:'https://tenki.jp/forecast/6/29/6000/25202/'},

  '琵琶湖':{lat:35.2958,lon:136.1253,name:'琵琶湖周邊',   tenki:'https://tenki.jp/forecast/6/29/6000/25201/'},

  '大阪':  {lat:34.6937,lon:135.5022,name:'大阪·OSAKA',  tenki:'https://tenki.jp/forecast/6/30/6200/27100/'},
  '奈良':  {lat:34.6851,lon:135.8048,name:'奈良·NARA',   tenki:'https://tenki.jp/forecast/6/30/6300/29201/'},
  '東京':  {lat:35.6762,lon:139.6503,name:'東京·TOKYO',  tenki:'https://tenki.jp/forecast/3/16/4410/13101/'},
  '中部機場':{lat:34.8583,lon:136.8050,name:'中部機場',   tenki:'https://tenki.jp/forecast/5/26/5110/23234/'},
};
function resolveC(p){if(COORDS[p])return COORDS[p];for(const[k,v]of Object.entries(COORDS)){if(p.includes(k)||k.includes(p))return v;}return COORDS['名古屋'];}
function wmo(c){if(c===0)return{ic:'☀️',d:'晴天'};if(c<=2)return{ic:'🌤',d:'部分多雲'};if(c===3)return{ic:'☁️',d:'多雲'};if(c<=49)return{ic:'🌫',d:'霧'};if(c<=59)return{ic:'🌦',d:'毛毛雨'};if(c<=69)return{ic:'🌧',d:'雨'};if(c<=79)return{ic:'🌨',d:'雪'};if(c<=84)return{ic:'🌧',d:'陣雨'};if(c<=99)return{ic:'⛈',d:'雷暴'};return{ic:'🌡',d:'—'};}
async function fetchWx(place){const c=resolveC(place);const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true&hourly=temperature_2m,precipitation_probability,weathercode,relativehumidity_2m,uv_index&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=8`);if(!r.ok)throw new Error('wx');return{coords:c,data:await r.json()};}
async function fetchAllWeather(){
  S.weatherData={};
  await Promise.allSettled(wxPlaces.map(async p=>{try{S.weatherData[p]=await fetchWx(p);}catch(e){}}));
  // 右上角天氣：用定位取當地溫度（不影響天氣頁內容）
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:la,longitude:lo}=pos.coords;
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current_weather=true&hourly=temperature_2m&timezone=auto&forecast_days=1`)
        .then(r=>r.json()).then(d=>{
          const t=Math.round(d.current_weather?.temperature??0);
          const w=wmo(d.current_weather?.weathercode??0);
          const el_temp=document.getElementById('hdr-temp');
          const el_sub=document.getElementById('hdr-sub');
          if(el_temp)el_temp.textContent=t+'°';
          if(el_sub)el_sub.textContent=w.ic+' 當地';
        }).catch(()=>{});
    },()=>{},{timeout:6000,maximumAge:300000});
  }
}



// ── RENDER HEADER
function renderHeader(){
  document.getElementById('ttl-txt').textContent=S.trip.title||'旅遊手帳';
  document.getElementById('dt-txt').textContent=S.trip.dates||'—';
  document.title=(S.trip.title||'旅遊手帳')+' · 手帳';
  if(wxPlaces[0]&&S.weatherData[wxPlaces[0]]){
    const{data}=S.weatherData[wxPlaces[0]];
    const t=Math.round(data.current_weather?.temperature??0),w=wmo(data.current_weather?.weathercode??0);
    document.getElementById('hdr-temp').textContent=t+'°';
    document.getElementById('hdr-sub').textContent=w.ic+' '+wxPlaces[0];
  }
}

// ── CITY TABS
const CICON={'名古屋':'🏯','愛知':'🌸','三重':'⛩','伊勢':'⛩','志摩':'🌊','鳥羽':'🌊','松阪':'🥩','滋賀':'🏔','彦根':'🏯','近江八幡':'🏯','琵琶湖':'🏞','京都':'⛩','大阪':'🏯','東京':'🗼','奈良':'🦌'};
// 建立城市標籤（可傳入指定地點清單，預設用 wxPlaces）
function buildCityTabs(places){
  const ct=document.getElementById('city-tabs');if(!ct)return;
  const list=(places||wxPlaces).filter(p=>p!=='目前位置');
  ct.innerHTML=list.map((p,i)=>`<button class="ctab ${i===curCity?'on':''}" onclick="switchCityByName('${p}')">${p}</button>`).join('');
}
function updateCityTabs(){document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('on',b.textContent.includes(wxPlaces.filter(p=>p!=='目前位置')[curCity]||'')));}
function switchCity(btn,idx){curCity=idx;updateCityTabs();renderWeather();}
function switchCityByName(place){
  const idx=wxPlaces.filter(p=>p!=='目前位置').indexOf(place);
  if(idx>=0){curCity=idx;renderWeather();}
  document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('on',b.textContent.includes(place)));
}

// ── DAY BAR
function mkDayBar(cId,tabKey,cb){
  const sc=document.getElementById(cId);if(!sc)return;sc.innerHTML='';
  S.days.forEach((d,i)=>{
    const parts=d.dateShort?d.dateShort.split('/'):'';
    const top=parts.length===2?parts[1]:String(d.dayNum);
    const bot=parts.length===2?`${parts[0]}月 D${d.dayNum}`:`D${d.dayNum}`;
    const ch=document.createElement('div');
    ch.className='dc'+(i===curDay[tabKey]?' on':'');
    ch.innerHTML=`<span class="dn">${top}</span><span class="dl">${bot}</span>`;
    ch.onclick=()=>{curDay[tabKey]=i;mkDayBar(cId,tabKey,cb);cb(i);document.documentElement.scrollTop=0;document.body.scrollTop=0;window.scrollTo(0,0);};
    sc.appendChild(ch);
  });
}

// ── RENDER ITINERARY

            ${xb}

// ── RENDER WEATHER（只顯示指定地點，不考慮定位）
function renderWxDays(){mkDayBar('wx-days','weather',renderWxDay);}
function renderWxDay(idx){
  const d=S.days[idx];if(!d)return;
  // 取得當天所有地點（去重）
  const dayPlaces=[...new Set((S.weatherDays[d.dayNum]||[]).map(w=>w.place).filter(Boolean))];
  const pl=dayPlaces[0]||wxPlaces[0]||'名古屋';
  // 更新城市標籤只顯示當天地點
  buildCityTabs(dayPlaces.length>0?dayPlaces:wxPlaces);
  const ci=wxPlaces.filter(p=>p!=='目前位置').indexOf(pl);
  if(ci>=0){curCity=ci;}
  renderWeather();
}
function renderWeather(){
  const pl=wxPlaces[curCity]||wxPlaces[0]||'名古屋';
  const wd=S.weatherData[pl];
  if(!wd){
    document.getElementById('wx-city').textContent=pl;
    document.getElementById('wx-temp').textContent='—°';
    ['wx-cond','wx-hl','wx-hum','wx-rain','wx-wind','wx-uv'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('hourly').innerHTML='';
    document.getElementById('forecast').innerHTML='';
    document.getElementById('advice').textContent='天氣資料取得中…';
    return;
  }
  const{coords,data}=wd;
  const cw=data.current_weather||{},w=wmo(cw.weathercode??0),t=Math.round(cw.temperature??0);
  const now=new Date(),ts=now.toISOString().split('T')[0];
  const allT=data.hourly?.time||[],ti=allT.findIndex(x=>x.startsWith(ts));
  const sl=(a,s,n)=>(a||[]).slice(Math.max(0,s),Math.max(0,s)+n);
  const hi=Math.round(data.daily?.temperature_2m_max?.[0]??t+3),lo=Math.round(data.daily?.temperature_2m_min?.[0]??t-4);
  const rp=data.daily?.precipitation_probability_max?.[0]??0,spd=Math.round(cw.windspeed??0);
  const hIdx=ti>=0?ti+now.getHours():0;
  const hm=data.hourly?.relativehumidity_2m?.[hIdx]??0;
  const uv=data.hourly?.uv_index?.[hIdx]??0,uvT=uv<=2?'低':uv<=5?'中等':uv<=7?'高':'極強';
  document.getElementById('wx-city').textContent=coords.name;
  document.getElementById('wx-temp').textContent=t+'°';
  document.getElementById('wx-cond').textContent=w.ic+' '+w.d;
  document.getElementById('wx-hl').textContent=`最高 ${hi}° · 最低 ${lo}°`;
  document.getElementById('wx-hum').textContent=hm+'%';
  document.getElementById('wx-rain').textContent=rp+'%';
  document.getElementById('wx-wind').textContent=spd+'km/h';
  document.getElementById('wx-uv').textContent=uvT;
  document.getElementById('tenki-lnk').href=coords.tenki;
  document.getElementById('hdr-temp').textContent=t+'°';
  document.getElementById('hdr-sub').textContent=w.ic+' '+coords.name.split('·')[0].trim();
  let adv=`目前氣溫 ${t}°，`;
  if(rp>60)adv+='今日降雨機率高，務必攜帶雨傘！';
  else if(rp>30)adv+='有機率降雨，建議備用摺疊傘。';
  else adv+='天氣晴朗舒適。';
  if(hi-lo>10)adv+=` 早晚溫差大（${lo}°~${hi}°），建議備薄外套。`;
  if(uvT==='高'||uvT==='極強')adv+=' 紫外線強烈，請做好防曬。';
  document.getElementById('advice').textContent=adv;
  const hs=ti>=0?ti+Math.max(0,now.getHours()-1):0;
  const hT=sl(data.hourly?.temperature_2m,hs,16),hR=sl(data.hourly?.precipitation_probability,hs,16);
  const hTm=sl(allT,hs,16),hW=sl(data.hourly?.weathercode,hs,16);
  const mn=Math.min(...hT),mx=Math.max(...hT);
  document.getElementById('hourly').innerHTML=hT.map((v,i)=>{
    const pct=mx===mn?50:Math.round(((v-mn)/(mx-mn))*72+10);
    const hr=hTm[i]?new Date(hTm[i]).getHours():(now.getHours()+i)%24;
    return `<div class="hi"><div class="hitime">${String(hr).padStart(2,'0')}時</div><div class="hiic">${wmo(hW[i]??0).ic}</div><div class="hibw"><div class="hib" style="height:${pct}%"></div></div><div class="hit">${Math.round(v)}°</div><div class="hir">${hR[i]??0}%</div></div>`;
  }).join('');
  const tripDates=S.days.map(d=>d.date).filter(Boolean);
  const tripStart=tripDates[0]||'',tripEnd=tripDates[tripDates.length-1]||'';
  const dT=data.daily?.time||[],dH=data.daily?.temperature_2m_max||[];
  const dL=data.daily?.temperature_2m_min||[],dR=data.daily?.precipitation_probability_max||[];
  const dW=data.daily?.weathercode||[];
  const DOW=['日','一','二','三','四','五','六'];
  const toShow=dT.map((dt,i)=>({dt,i})).filter(({dt})=>!tripStart||!tripEnd||(dt>=tripStart.substring(0,10)&&dt<=tripEnd.substring(0,10)));
  const showList=toShow.length>0?toShow:dT.map((dt,i)=>({dt,i}));
  document.getElementById('forecast').innerHTML=showList.map(({dt,i})=>{
    const d2=new Date(dt);
    const matchDay=S.days.find(d=>d.date&&d.date.startsWith(dt));
    const dayLabel=matchDay?`D${matchDay.dayNum}`:'';
    return `<div class="fcc">
      ${dayLabel?`<div style="font-size:9px;font-weight:700;color:#c0392b;margin-bottom:1px">${dayLabel}</div>`:''}
      <div class="fcd">${d2.getMonth()+1}/${d2.getDate()}<br>${DOW[d2.getDay()]}</div>
      <div class="fcic">${wmo(dW[i]??0).ic}</div>
      <div class="fchi">${Math.round(dH[i]??0)}°</div>
      <div class="fclo">${Math.round(dL[i]??0)}°</div>
      <div class="fcr">☔${dR[i]??0}%</div>
    </div>`;
  }).join('');
}

// ── RENDER TRANSPORT
function renderTrDays(){mkDayBar('tr-days','transport',renderTrDay);}
function renderTrDay(idx){
  const d=S.days[idx];if(!d)return;
  const items=(S.itinerary[d.dayNum]||[]).filter(it=>it.type==='transport');
  let h=`<div class="dtrow"><div class="dttxt">${d.dateShort||''} ${d.title}</div></div>`;
  if(!items.length){
    h+=`<div class="loading-card"><span style="font-size:30px;display:block;margin-bottom:7px">🚃</span><div style="color:#9c8e7e">此天無交通行程</div></div>`;
  }else{
    items.forEach(it=>{
      const pts=it.name.split(/[→➜]|->/).map(s=>s.trim());
      const from=pts[0]||it.name,to=pts[1]||'';
      const depT=it.timeS||'—',arrT=it.timeE||'—';

      if(it.trImg){
        // 有交通圖：深藍標題 + 圖片 + 備註
        h+=`<div class="trc">
          <div class="trh">
            <div class="trrt">${from}${to?' → '+to:''}</div>
            <div class="trtp">${it.cat||'交通'}</div>
          </div>
          <div style="overflow:hidden">
            <img src="${gdriveUrl(it.trImg)}" alt="${it.name}" style="width:100%;height:auto;display:block" loading="lazy" onerror="this.parentElement.style.display='none'">
          </div>
          ${it.note?`<div style="padding:10px 14px;background:var(--wa2);border-top:1px solid var(--wa3);font-size:var(--sm);color:var(--su2);line-height:1.75">${it.note.replace(/\n/g,'<br>')}</div>`:''}
        </div>`;
      }else{
        // 無交通圖：顯示深藍標題 + 路線時間資訊（如有起訖站）
        h+=`<div class="trc">
          <div class="trh">
            <div class="trrt">${from}${to?' → '+to:''}</div>
            <div class="trtp">${it.cat||'交通'}</div>
          </div>
          ${to?`<div style="display:flex;align-items:center;gap:8px;padding:10px 13px">
            <div style="text-align:center;flex:1">
              <div style="font-size:13px;font-weight:700">${from}</div>
              <div style="font-size:13px;color:#5c5044;margin-top:3px">${depT}</div>
            </div>
            <div style="flex:2;position:relative;padding:0 8px">
              <div style="font-size:11px;color:#5c5044;text-align:center;margin-bottom:3px;font-weight:600">${it.desc||''}</div>
              <div style="height:2px;background:#6898b0"></div>
              <div style="font-size:11px;color:#9c8e7e;text-align:center;margin-top:3px">${it.dur||''}</div>
              <div style="position:absolute;right:0;top:18px;color:#3d6e8a;font-size:11px">▶</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="font-size:13px;font-weight:700">${to}</div>
              <div style="font-size:13px;color:#5c5044;margin-top:3px">${arrT}</div>
            </div>
          </div>`:it.desc?`<div style="padding:9px 13px;font-size:12px;color:#5c5044">${it.desc}</div>`:''}
          ${it.note?`<div style="padding:10px 14px;background:var(--wa2);border-top:1px solid var(--wa3);font-size:var(--sm);color:var(--su2);line-height:1.75">${it.note.replace(/\n/g,'<br>')}</div>`:''}
        </div>`;
      }
    });
  }
  setEl('tr-content',h);
}



// ── RENDER MAP PAGE
// Sheet[地圖] 欄位：地圖名稱, 地圖LOGO, 地圖（圖片連結）
function renderMapPage(rows){
  if(!rows||rows.length<2){
    setEl('map-content','<div class="loading-card"><div>無地圖資料</div></div>');return;
  }
  const hdr=rows[0];
  const fi=(...keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h===k||h.includes(k));if(i>=0)return i;}return -1;};
  const cName=fi('地圖名稱','名稱','name');
  const cLogo=fi('地圖LOGO','LOGO','logo','標誌');
  // 精確比對「地圖」欄位（排除含「地圖名稱」「地圖LOGO」的欄位）
  const cImg=hdr.findIndex(h=>h.trim()==='地圖'||h.trim()==='map'||h.trim()==='image'||h.trim()==='img'||h.trim()==='圖片');
  const cUrl=fi('連結','網頁','url','link');
  const fc=(r,c,fb)=>c>=0?String(r[c]??'').trim():(fb>=0?String(r[fb]??'').trim():'');

  // 景點標示圖（SHEET[主題] B3）
  let h='';
  if(S.trip.mapImg){
    const imgSrc=gdriveUrl(S.trip.mapImg);
    h+=`<div style="margin-bottom:12px;border-radius:9px;overflow:hidden;border:1px solid var(--wa3);box-shadow:0 2px 6px var(--sh);cursor:zoom-in" onclick="openLightbox('${S.trip.mapImg}','')">
      <img src="${imgSrc}" alt="景點地圖" style="width:100%;height:auto;display:block" loading="lazy" onerror="this.parentElement.style.display='none'">
    </div>`;
  }
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name=fc(r,cName,0);
    const logo=fc(r,cLogo,1);
    const img=fc(r,cImg,2);
    const url=fc(r,cUrl,-1);
    if(!name)continue;
    const logoHtml=logo
      ?`<div class="map-logo"><img src="${gdriveUrl(logo)}" alt="${name}" onerror="this.parentElement.textContent='🗺️'"></div>`
      :`<div class="map-logo">🗺️</div>`;
    h+=`<div class="map-card">
      <div class="map-card-hdr" onclick="toggleMap(${i})">
        ${logoHtml}
        <div class="map-name">${name}</div>
        <div class="map-chevron" id="map-chev-${i}">▼</div>
      </div>
      ${img?`<div class="map-img-box" id="map-img-${i}">
        <img src="${gdriveUrl(img)}" alt="${name}" loading="lazy" style="cursor:zoom-in" onclick="openLightbox('${img}','${url||''}')" onerror="this.parentElement.style.display='none'">
      </div>`:''}
    </div>`;
  }
  if(!h)h='<div class="loading-card"><div style="color:var(--su3)">尚無地圖資料</div></div>';
  setEl('map-content',h);
}

function openLightbox(src,url){
  // 直接開連結（若有），否則開原始圖片
  if(url)window.open(url,'_blank');
  else window.open(gdriveHiRes(src),'_blank');
}
function closeLightbox(){}

function toggleMap(i){
  const box=document.getElementById('map-img-'+i);
  const chev=document.getElementById('map-chev-'+i);
  if(!box)return;
  box.classList.toggle('show');
  if(chev)chev.classList.toggle('open');
}

// ── RENDER SHOPPING
function renderShopping(rows){
  if(!rows||rows.length<2){setEl('shop-content','<div class="loading-card"><div>無購物資料</div></div>');return;}
  const hdr=rows[0];
  const fi=(...keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h===k||h.includes(k));if(i>=0)return i;}return -1;};
  const cStore=fi('店家','商店','store'),cLogo=fi('LOGO','logo','標誌');
  const cItem=fi('商品','品名','product','名稱'),cNote=fi('備註','備注','note','說明');
  const cUrl=fi('連結','網頁','url'),cImg=fi('圖片','image','img','照片');
  const fc=(r,c,fb)=>c>=0?String(r[c]??'').trim():(fb>=0?String(r[fb]??'').trim():'');
  const stores={},storeOrder=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const store=fc(r,cStore,0)||'其他';
    const item=fc(r,cItem,2);if(!item)continue;
    if(!stores[store]){stores[store]={logo:fc(r,cLogo,1),items:[]};storeOrder.push(store);}
    stores[store].items.push({name:item,note:fc(r,cNote,3),url:fc(r,cUrl,4),img:fc(r,cImg,5)});
  }
  let h='';
  storeOrder.forEach((store,si)=>{
    const{logo,items}=stores[store];
    const logoHtml=logo?`<div class="shop-logo"><img src="${gdriveUrl(logo)}" alt="${store}" onerror="this.parentElement.textContent='🛍'"></div>`:`<div class="shop-logo">🛍</div>`;
    h+=`<div class="shop-store">
      <div class="shop-store-hdr" onclick="toggleStore(${si})">
        ${logoHtml}
        <div style="flex:1;min-width:0">
          <div class="shop-store-name">${store}</div>
          <div class="shop-store-count">${items.length} 件商品</div>
        </div>
        <div class="shop-chevron" id="chev-${si}">▼</div>
      </div>
      <div class="shop-items" id="store-${si}">`;
    items.forEach(it=>{
      h+=`<div class="shop-item">
        ${it.img?`<img src="${gdriveUrl(it.img)}" alt="${it.name}" class="shop-item-img" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="shop-item-name">${it.name}</div>
        ${it.note?`<div class="shop-item-note">${it.note.replace(/\n/g,'<br>')}</div>`:''}
        ${it.url?`<div class="shop-item-links"><a class="xlink" href="${it.url}" target="_blank">🔗 開啟網頁 ↗</a></div>`:''}
      </div>`;
    });
    h+='</div></div>';
  });
  if(!h)h='<div class="loading-card"><div style="color:var(--su3)">尚無購物資料</div></div>';
  setEl('shop-content',h);
}

function toggleStore(si){
  const items=document.getElementById('store-'+si);
  const chev=document.getElementById('chev-'+si);
  if(!items)return;
  items.classList.toggle('show');
  if(chev)chev.classList.toggle('open');
}

function toggleTrImg(hdr){
  const box=hdr.parentElement.querySelector('.tr-img-box');
  const arrow=hdr.querySelector('.tr-img-arrow');
  if(!box)return;
  const show=box.style.display==='none'||!box.style.display;
  box.style.display=show?'block':'none';
  if(arrow)arrow.style.transform=show?'rotate(180deg)':'rotate(0deg)';
}
